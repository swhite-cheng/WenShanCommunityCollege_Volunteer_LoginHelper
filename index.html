<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="志工助手">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文山社大 志工簽到/簽退 撇步 v1.1</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #2196F3;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        h2 { margin-top: 0; color: #333; font-size: 1.2rem; text-align: center; }
        
        /* 圖片顯示區域 */
        #viewer-container {
            width: 100%;
            height: 300px;
            background: #eee;
            border-radius: 8px;
            overflow: hidden; /* 確保圖片縮放平移不超出邊框 */
            position: relative;
            margin-bottom: 15px;
            border: 2px dashed #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 重要：防止行動端瀏覽器預設的手勢捲動干擾 */
            touch-action: none; 
        }
        #preview-img {
            max-width: 100%;
            display: block;
            /* 移除原本的 transition，因為手勢互動需要即時反應 */
            transition: none; 
            transform-origin: center; /* 縮放中心 */
            cursor: grab;
        }

        /* 輸入控制項 */
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #666; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            text-align: center;
            border: 2px solid #ddd;
            border-radius: 6px;
            text-transform: uppercase;
            box-sizing: border-box;
            letter-spacing: 2px;
        }

        /* 按鈕樣式 */
        button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-upload { background: var(--secondary-color); color: white; }
        .btn-copy { background: #607d8b; color: white; }
        .btn-link { background: var(--primary-color); color: white; }
        button:active { opacity: 0.8; }
    </style>
</head>
<body>

<div class="card">
    <h2>文山社大 志工簽到/簽退 撇步 v1.1</h2>

    <div id="viewer-container">
        <p id="placeholder" style="color: #999;">請先選擇照片</p>
        <img id="preview-img" src="" alt="" style="display:none;">
    </div>
    
    <input type="file" id="file-input" accept="image/*" style="display:none;">
    <button class="btn-upload" onclick="document.getElementById('file-input').click()">1. 選擇/拍攝照片</button>

    <hr style="margin: 20px 0; border: 0.5px solid #eee;">

    <div class="input-group">
        <label>驗證碼 (4位大寫英數)</label>
        <input type="text" id="captcha-input" maxlength="4" placeholder="例如: AA41" autocomplete="off">
    </div>
    <button class="btn-copy" onclick="copyCaptcha()">2. 複製驗證碼</button>

    <button class="btn-link" onclick="openLoginSite()">3. 前往文山志工網</button>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const previewImg = document.getElementById('preview-img');
    const placeholder = document.getElementById('placeholder');
    const captchaInput = document.getElementById('captcha-input');
    const container = document.getElementById('viewer-container');

    // --- 手勢操作狀態變數 ---
    let state = {
        scale: 1,      // 當前縮放比例
        panning: false,// 是否正在平移
        pointX: 0,     // 圖片當前 X 位移
        pointY: 0,     // 圖片當前 Y 位移
        startX: 0,     // 觸控開始時的 X
        startY: 0,     // 觸控開始時的 Y
        initialDist: 0,// 兩指初始距離
    };

    // 限制縮放範圍
    const MAX_SCALE = 4;
    const MIN_SCALE = 1;

    // --- 圖片讀取功能 (更新：重置手勢狀態) ---
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                previewImg.src = event.target.result;
                previewImg.style.display = 'block';
                placeholder.style.display = 'none';
                resetMap(); // 讀取新圖時重置所有縮放平移
            }
            reader.readAsDataURL(file);
        }
    });

    // --- 核心函式：更新圖片的 Transform 狀態 ---
    function updateTransform() {
        // 使用 translate3d 可啟用硬體加速，較順暢
        previewImg.style.transform = `translate3d(${state.pointX}px, ${state.pointY}px, 0px) scale(${state.scale})`;
    }

    // 重置圖片狀態
    function resetMap() {
        state.scale = 1;
        state.pointX = 0;
        state.pointY = 0;
        updateTransform();
    }

    // 計算兩指尖距離的輔助函式
    function getDistance(touches) {
        return Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
    }

    // --- 觸控事件處理 ---

    // 1. 觸控開始
    container.addEventListener('touchstart', function(e) {
        e.preventDefault(); // 防止預設捲動行為

        if (e.touches.length === 2) {
            // 兩指觸控：準備縮放
            state.panning = false;
            state.initialDist = getDistance(e.touches);
        } else if (e.touches.length === 1) {
            // 單指觸控：準備平移
            state.panning = true;
            // 記錄開始點，需扣除目前的位移量
            state.startX = e.touches[0].clientX - state.pointX;
            state.startY = e.touches[0].clientY - state.pointY;
        }
    });

    // 2. 觸控移動
    container.addEventListener('touchmove', function(e) {
        e.preventDefault();

        if (e.touches.length === 2 && state.initialDist > 0) {
            // 兩指：實作雙指撥弄縮放 (Pinch-to-Zoom)
            const currentDist = getDistance(e.touches);
            // 計算縮放倍率 (新的距離 / 舊的距離)
            const diff = currentDist / state.initialDist;
            
            // 更新縮放比例，並限制在最大與最小值之間
            let newScale = state.scale * diff;
            newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));
            
            // 更新狀態 (註：此處為簡單縮放，未精確計算兩指中心點縮放，對驗證碼查看已足夠)
            state.scale = newScale;
            state.initialDist = currentDist; // 更新初始距離供下次計算

            // 縮放時若小於 1，重置位置
            if (state.scale <= 1) {
                state.pointX = 0;
                state.pointY = 0;
            }
            
            updateTransform();

        } else if (e.touches.length === 1 && state.panning) {
            // 單指：實作平移 (Panning)
            // 只有在放大狀態下才允許平移
            if (state.scale > 1) {
                state.pointX = e.touches[0].clientX - state.startX;
                state.pointY = e.touches[0].clientY - state.startY;
                updateTransform();
            }
        }
    });

    // 3. 觸控結束
    container.addEventListener('touchend', function(e) {
        // 單指平移結束
        if (e.touches.length < 1) {
            state.panning = false;
        }
        // 雙指縮放結束
        if (e.touches.length < 2) {
            state.initialDist = 0;
        }
    });

    // --- 原有其他功能保留 ---

    // 驗證碼輸入處理：自動轉大寫
    captchaInput.addEventListener('input', function() {
        this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    });

    // 複製驗證碼功能
    function copyCaptcha() {
        const val = captchaInput.value;
        if (!val) {
            alert('請先輸入驗證碼');
            return;
        }
        navigator.clipboard.writeText(val).then(() => {
            alert('已複製驗證碼: ' + val);
        }).catch(err => {
            captchaInput.select();
            document.execCommand('copy');
            alert('已複製');
        });
    }

    // 開啟網站功能
    function openLoginSite() {
        window.open('https://wenshan.org.tw/volunteer/login.php', '_blank');
    }
</script>

</body>
</html>
