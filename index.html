<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文山社大 志工簽到/簽退 撇步 v1.2</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #2196F3;
            --accent-color: #673AB7;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        h2 { margin-top: 0; color: #333; font-size: 1.2rem; text-align: center; }
        
        #viewer-container {
            width: 100%;
            height: 300px;
            background: #eee;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            margin-bottom: 15px;
            border: 2px dashed #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none; 
        }
        #preview-img {
            max-width: 100%;
            display: block;
            transition: none; 
            transform-origin: center;
            cursor: grab;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #666; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            text-align: center;
            border: 2px solid #ddd;
            border-radius: 6px;
            text-transform: uppercase;
            box-sizing: border-box;
            letter-spacing: 2px;
        }

        button {
            width: 100%;
            padding: 14px 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-upload { background: var(--secondary-color); color: white; }
        .btn-combined { background: var(--primary-color); color: white; line-height: 1.4; }
        button:active { opacity: 0.8; }
    </style>
</head>
<body>

<div class="card">
    <h2>文山社大 志工簽到/簽退 撇步 v1.2</h2>

    <div id="viewer-container">
        <p id="placeholder" style="color: #999;">請先選擇照片</p>
        <img id="preview-img" src="" alt="" style="display:none;">
    </div>
    
    <input type="file" id="file-input" accept="image/*" style="display:none;">
    <button class="btn-upload" onclick="document.getElementById('file-input').click()">1. 選擇/拍攝照片</button>

    <hr style="margin: 20px 0; border: 0.5px solid #eee;">

    <div class="input-group">
        <label>驗證碼 (4位大寫英數)</label>
        <input type="text" id="captcha-input" maxlength="4" placeholder="例如: AA41" autocomplete="off">
    </div>
    
    <button class="btn-combined" onclick="copyAndOpen()">2. 複製驗證碼到剪貼簿&<br>前往文山志工簽到</button>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const previewImg = document.getElementById('preview-img');
    const placeholder = document.getElementById('placeholder');
    const captchaInput = document.getElementById('captcha-input');
    const container = document.getElementById('viewer-container');

    // --- 手勢操作狀態變數 ---
    let state = {
        scale: 1,
        panning: false,
        pointX: 0,
        pointY: 0,
        startX: 0,
        startY: 0,
        initialDist: 0,
    };

    const MAX_SCALE = 4;
    const MIN_SCALE = 1;

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                previewImg.src = event.target.result;
                previewImg.style.display = 'block';
                placeholder.style.display = 'none';
                resetMap();
            }
            reader.readAsDataURL(file);
        }
    });

    function updateTransform() {
        previewImg.style.transform = `translate3d(${state.pointX}px, ${state.pointY}px, 0px) scale(${state.scale})`;
    }

    function resetMap() {
        state.scale = 1;
        state.pointX = 0;
        state.pointY = 0;
        updateTransform();
    }

    function getDistance(touches) {
        return Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
    }

    // 觸控事件
    container.addEventListener('touchstart', function(e) {
        if (e.touches.length === 2) {
            state.panning = false;
            state.initialDist = getDistance(e.touches);
        } else if (e.touches.length === 1) {
            state.panning = true;
            state.startX = e.touches[0].clientX - state.pointX;
            state.startY = e.touches[0].clientY - state.pointY;
        }
    });

    container.addEventListener('touchmove', function(e) {
        e.preventDefault();
        if (e.touches.length === 2 && state.initialDist > 0) {
            const currentDist = getDistance(e.touches);
            const diff = currentDist / state.initialDist;
            let newScale = state.scale * diff;
            newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));
            state.scale = newScale;
            state.initialDist = currentDist;
            if (state.scale <= 1) {
                state.pointX = 0;
                state.pointY = 0;
            }
            updateTransform();
        } else if (e.touches.length === 1 && state.panning) {
            if (state.scale > 1) {
                state.pointX = e.touches[0].clientX - state.startX;
                state.pointY = e.touches[0].clientY - state.startY;
                updateTransform();
            }
        }
    });

    container.addEventListener('touchend', function(e) {
        if (e.touches.length < 1) state.panning = false;
        if (e.touches.length < 2) state.initialDist = 0;
    });

    captchaInput.addEventListener('input', function() {
        this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    });

    // --- 整合功能函式 ---
    function copyAndOpen() {
        const val = captchaInput.value;
        if (!val) {
            alert('請先輸入驗證碼');
            return;
        }

        // 執行複製動作
        navigator.clipboard.writeText(val).then(() => {
            console.log('驗證碼已複製');
            // 跳轉網頁
            window.open('https://wenshan.org.tw/volunteer/login.php', '_blank');
        }).catch(err => {
            // 備用複製方案
            captchaInput.select();
            document.execCommand('copy');
            window.open('https://wenshan.org.tw/volunteer/login.php', '_blank');
        });
    }
</script>

</body>
</html>
